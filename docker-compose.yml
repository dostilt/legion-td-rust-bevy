version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: legiontd-db
    environment:
      POSTGRES_USER: legiontd
      POSTGRES_PASSWORD: password
      POSTGRES_DB: legiontd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legiontd"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: legiontd-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

